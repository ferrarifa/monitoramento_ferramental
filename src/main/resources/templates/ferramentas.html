<html xmlns="http://www.thymeleafy.org">
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
        <title>Listar Ferramentas</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
    <tbody>

    <table class="table table-striped">

        <thead>
            <tr>
                <th scope="col">Nome da Ferramenta</th>
                <th scope="col">Horas de uso</th>
                <th scope="col">Vida maxima</th>
            </tr>
        </thead>
        <tbody>
        <tr th:each ="func: ${ferramentas}">                
                <td th:text="${func.nome}">Nome</td>
                <td th:text="${func.horasUso}">Horas de uso</td>
                <td th:text="${func.vidaUtilMaxima}">Vida Maxima!</td>
            </tr>
        </tbody>
    </table>    
</tbody>

</body>
</html>
